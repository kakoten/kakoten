name: Kakoten Daily

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  collect-jma:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary requests beautifulsoup4
      - run: python scripts/jma_collector.py collect
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  collect-tenki:
    runs-on: ubuntu-latest
    needs: collect-jma
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - run: pip install psycopg2-binary selenium
      - run: python scripts/scrape_tenki.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  collect-yahoo:
    runs-on: ubuntu-latest
    needs: collect-jma
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - run: pip install psycopg2-binary selenium
      - run: python scripts/scrape_yahoo.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  verify:
    runs-on: ubuntu-latest
    needs: [collect-tenki, collect-yahoo]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - run: python scripts/jma_collector.py verify
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  tweet:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary anthropic requests requests-oauthlib
      - run: python scripts/tweet_generator.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
