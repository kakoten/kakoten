name: Kakoten Daily

on:
  schedule:
    - cron: '0 22 * * *'   # JST 7:00 - JMA collect
    - cron: '30 22 * * *'  # JST 7:30 - tenki/yahoo
    - cron: '0 23 * * *'   # JST 8:00 - verify
    - cron: '0 0 * * *'    # JST 9:00 - tweet
  workflow_dispatch:

jobs:
  collect-jma:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - run: python scripts/jma_collector.py collect
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  collect-tenki:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 22 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - run: pip install psycopg2-binary selenium
      - run: python scripts/scrape_tenki.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  collect-yahoo:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 22 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - run: pip install psycopg2-binary selenium
      - run: python scripts/scrape_yahoo.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  verify:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 23 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - run: python scripts/jma_collector.py verify
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  tweet:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary anthropic requests requests-oauthlib
      - run: python scripts/tweet_generator.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
